apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: portal
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: portal
    app.kubernetes.io/instance: portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
      app.kubernetes.io/instance: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portal
        app.kubernetes.io/instance: portal
    spec:
      serviceAccountName: portal-runtime
      automountServiceAccountToken: false
      nodeSelector:
        node-role.ryuwon.dev/app: "true"
      tolerations:
        - key: workload.ryuwon.dev/edge
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portal
          image: ghcr.io/ryuwon-dev/portal:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: portal
  namespace: portal
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portal
      app.kubernetes.io/instance: portal
