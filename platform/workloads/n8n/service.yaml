apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n
  ports:
    - name: http
      port: 5678
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-outpost
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: authentik-outpost
    app.kubernetes.io/instance: n8n
spec:
  type: ExternalName
  externalName: authentik-server.authentik.svc.cluster.local
  ports:
    - name: http
      port: 80
      targetPort: 80
