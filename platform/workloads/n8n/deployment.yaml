apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n
      app.kubernetes.io/instance: n8n
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n
        app.kubernetes.io/instance: n8n
    spec:
      nodeSelector:
        node-role.ryuwon.dev/data: "true"
      tolerations:
        - key: workload.ryuwon.dev/edge
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:2.19.4
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5678
          env:
            - name: GENERIC_TIMEZONE
              value: Asia/Seoul
            - name: TZ
              value: Asia/Seoul
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "true"
            - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
              value: "true"
            - name: N8N_SSRF_PROTECTION_ENABLED
              value: "true"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_HOST
              value: n8n.ryuwon.me
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_EDITOR_BASE_URL
              value: https://n8n.ryuwon.me/
            - name: WEBHOOK_URL
              value: https://n8n.ryuwon.me/
            - name: N8N_PROXY_HOPS
              value: "1"
            - name: EXTERNAL_HOOK_FILES
              value: /home/node/hooks/forward-auth-sso.js
            - name: N8N_FORWARD_AUTH_HEADER
              value: X-authentik-email
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
            - name: N8N_TEMPLATES_ENABLED
              value: "false"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: encryption-key
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: n8n-forward-auth-hook
              mountPath: /home/node/hooks
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: n8n-forward-auth-hook
          configMap:
            name: n8n-forward-auth-hook
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
