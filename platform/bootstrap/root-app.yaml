apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ryuwon-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ryuwon-dev/lab.git
    targetRevision: main
    path: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
