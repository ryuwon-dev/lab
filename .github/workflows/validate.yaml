name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install YAML tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Lint YAML
        run: yamllint .

      - name: Render platform kustomization
        run: |
          mkdir -p .rendered
          kubectl kustomize platform > .rendered/platform.yaml

      - name: Validate Kubernetes schemas
        uses: docker://ghcr.io/yannh/kubeconform:v0.6.7
        with:
          args: -summary -ignore-missing-schemas .rendered/platform.yaml

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: rhysd/actionlint@v1

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.0
        with:
          args: dir --redact --verbose .
